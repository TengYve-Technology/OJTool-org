name: 🔥 手动强制覆盖（危险！）

on:
  workflow_dispatch:
    description: '⚠️ 强制将个人仓库覆盖到组织仓库，会丢失组织仓库的所有新提交！'

permissions:
  contents: write

jobs:
  force-sync:
    runs-on: ubuntu-latest
    steps:
      - name: ⚠️ 确认警告
        run: |
          echo "🔥🔥🔥 警告：此操作将强制覆盖组织仓库！"
          echo "组织仓库的所有新提交将被永久丢失！"
          echo "确认执行请查看 Actions 日志"

      - name: 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 克隆个人仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/YLZ2013git/OJTool.git source

      - name: 强制覆盖组织仓库
        run: |
          cd source
          git remote set-url origin https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/OJTool-org.git
          git push --force origin main
          echo "✅ 强制覆盖完成！"
