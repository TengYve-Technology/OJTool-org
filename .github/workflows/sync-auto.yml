name: 自动同步（检测冲突）

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 克隆个人仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/YLZ2013git/OJTool.git source

      - name: 克隆组织仓库
        run: |
          git clone https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/OJTool-org.git target

      - name: 检查冲突
        id: check_conflict
        run: |
          cd target
          REMOTE_HEAD=$(git rev-parse HEAD)
          
          cd ../source
          SOURCE_HEAD=$(git rev-parse HEAD)
          
          if [ "$REMOTE_HEAD" == "$SOURCE_HEAD" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "两个仓库 HEAD 相同，无需同步"
            exit 0
          fi
          
          cd ../target
          if git merge-base --is-ancestor HEAD ../source/HEAD 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "组织仓库没有新提交，可以安全覆盖"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            NEW_COMMITS=$(git log --oneline ../source/HEAD..HEAD --no-merges 2>/dev/null || echo "")
            if [ -n "$NEW_COMMITS" ]; then
              echo "new_commits<<EOF" >> $GITHUB_OUTPUT
              echo "$NEW_COMMITS" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
            echo "检测到组织仓库有新提交"
          fi

      - name: 创建冲突 Issue
        if: steps.check_conflict.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const newCommits = `${{ steps.check_conflict.outputs.new_commits || '（无法获取提交列表）' }}`;
            const now = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const issueBody = `
            ## ⚠️ 检测到组织仓库有新提交，同步已暂停

            组织仓库 **OJTool-org** 在本次同步周期内检测到了新的提交，为防止数据丢失，**强制覆盖操作已停止**。

            ---

            ### 📝 新提交记录（组织仓库独有）
            \`\`\`
            ${newCommits}
            \`\`\`

            ---

            ### 🔧 请选择处理方式

            1. **保留这些提交** → 手动合并到个人仓库，然后关闭此 Issue
            2. **丢弃这些提交** → 使用手动强制覆盖 Action

            ---

            ### 📅 检测信息
            - 检测时间：${now}
            - 相关执行：${runUrl}

            ---

            *此 Issue 由 GitHub Actions 自动创建，关闭后下次自动同步将恢复。*
            `;

            await github.rest.issues.create({
              owner: 'TengYve-Technology',
              repo: 'OJTool-org',
              title: `[自动] ⚠️ 同步冲突 - ${new Date().toISOString().slice(0, 10)}`,
              body: issueBody,
              labels: ['sync-conflict', 'auto-generated']
            });

      - name: 强制覆盖同步
        if: steps.check_conflict.outputs.has_changes == 'false'
        run: |
          cd source
          git remote set-url origin https://${{ secrets.PERSONAL_TOKEN }}@github.com/TengYve-Technology/OJTool-org.git
          git push --force origin main
          echo "✅ 强制覆盖同步完成"
